# ╔══════════════════════════════════╗
# ║         hyprlock config          ║
# ║     simple · clean · minimal     ║
# ╚══════════════════════════════════╝

# ── General ───────────────────────────────────────────────
general {
    disable_loading_bar   = true
    hide_cursor           = true
    grace                 = 0
    no_fade_in            = false
    no_fade_out           = false
    ignore_empty_input    = true
}

# ── Background ────────────────────────────────────────────
background {
    monitor     =
    path        = ~/Pictures/wallpapers/desktop.jpg
    color       = rgba(10, 10, 10, 1.0)  # near-black

    blur_passes = 3                         
    blur_size   = 3
}

# ── Clock (time) ──────────────────────────────────────────
label {
    monitor     =
    text        = cmd[update:1000] echo "$(date +"%H:%M")"
    color       = rgba(220, 220, 220, 0.90)
    font_size   = 80
    font_family = Adwaita-Mono

    position    = 0, 120
    halign      = center
    valign      = center
}

# ── Date ──────────────────────────────────────────────────
label {
    monitor     =
    text        = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color       = rgba(160, 160, 160, 0.55)
    font_size   = 14
    font_family = Adwaita-Mono

    position    = 0, 40
    halign      = center
    valign      = center
}

# ── Password input ────────────────────────────────────────
input-field {
    monitor         =
    size            = 240, 42
    outline_thickness = 1
    dots_size       = 0.22
    dots_spacing    = 0.30
    dots_center     = true

    # Colors
    outer_color     = rgba(60, 60, 60, 0.80)
    inner_color     = rgba(18, 18, 18, 0.95)
    font_color      = rgba(220, 220, 220, 0.90)

    # Feedback colors
    check_color     = rgba(130, 190, 130, 1.0)   # soft green
    fail_color      = rgba(200, 100, 100, 1.0)    # soft red

    fade_on_empty   = true
    placeholder_text = <span foreground="##666666">password</span>

    font_family     = Adwaita-Mono
    font_size       = 13

    rounding        = 6

    position        = 0, -60
    halign          = center
    valign          = center
}

# ── Fail / error message ──────────────────────────────────
label {
    monitor     =
    text        = Hi there, Hieu PC!
    color       = rgba(220, 220, 220, 0.90)
    font_size   = 11
    font_family = Adwaita-Mono

    position    = 0, -110
    halign      = center
    valign      = center
}
